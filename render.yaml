services:
  - type: web
    name: auto-analytics-ai-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REPORT_BASE_URL
        sync: false
  - type: web
    name: auto-analytics-ai-web
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: BACKEND_API_URL
        value: https://auto-analytics-ai-api.onrender.com
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /api/proxy/api/v1
      - key: NEXT_PUBLIC_DIRECT_BACKEND_API_URL
        value: https://auto-analytics-ai-api.onrender.com/api/v1
